<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Flow - Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      margin-bottom: 1rem;
      color: #3b82f6;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
    }
    .retry-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1rem;
      font-size: 1rem;
    }
    .retry-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="icon">🎬</div>
    <h1>Clip Flow Offline</h1>
    <p>You're currently offline. Some features may not be available until you reconnect to the internet.</p>
    <p>Your video clips are safely cached and will sync when you're back online.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
