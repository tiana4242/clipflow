  <!-- Critical CSS for immediate rendering -->
  <style>
    /* Critical above-the-fold styles */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f1f5f9;
      min-height: 100vh;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading skeleton for faster perceived performance */
    .loading-skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Critical layout structure */
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header-placeholder {
      height: 64px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      padding: 0 1rem;
    }
    
    .main-placeholder {
      flex: 1;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .logo-placeholder {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    
    .text-placeholder {
      width: 200px;
      height: 24px;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    
    /* Hide loading skeleton when app loads */
    .app-loaded .loading-skeleton {
      display: none;
    }
  </style>

  <!-- Skip links for accessibility -->
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      left: 6px;
      background: #0f172a;
      color: white;
      padding: 8px 12px;
      text-decoration: none;
      border-radius: 4px;
      z-index: 1000;
      transition: top 0.3s;
      font-weight: 500;
      border: 2px solid #8b5cf6;
    }
    .skip-link:focus {
      top: 6px;
      outline: 2px solid #8b5cf6;
      outline-offset: 2px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- Skip to main content for screen readers -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <a href="#footer" class="skip-link">Skip to footer</a>
  <a href="#nav" class="skip-link">Skip to navigation</a>
  
  <!-- Loading skeleton for faster perceived performance -->
  <div id="loading-skeleton" class="app-container">

    </div>

      <div class="text-placeholder loading-skeleton" style="width: 150px;"></div>
    </div>
  </div>
  
  <!-- Main application container with proper landmark -->

  <!-- Fallback for users without JavaScript -->
  <noscript>
    <div style="text-align: center; padding: 2rem; font-family: Arial, sans-serif;">

      <p>You need to enable JavaScript to run Clip Flow video processor.</p>
      <p>Please enable JavaScript in your browser settings and reload the page.</p>
    </div>
  </noscript>
  
  <!-- Screen reader announcements -->
  <div id="sr-live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <div id="sr-alert-region" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
  
  <!-- Performance monitoring and loading removal -->
  <script>
    // Remove loading skeleton when app loads
    window.addEventListener('load', function() {
      const skeleton = document.getElementById('loading-skeleton');
      if (skeleton) {
        skeleton.style.display = 'none';
      }
      document.body.classList.add('app-loaded');
    });
    
    // Performance monitoring
    if ('performance' in window) {
      window.addEventListener('load', function() {
        setTimeout(function() {
          const perfData = performance.getEntriesByType('navigation')[0];
          console.log('🚀 Performance Metrics:', {
            'FCP': perfData.responseStart - perfData.requestStart,
            'LCP': perfData.loadEventEnd - perfData.requestStart,
            'TTFB': perfData.responseStart - perfData.requestStart,
            'DomLoad': perfData.domContentLoadedEventEnd - perfData.requestStart
          });
        }, 0);
      });
    }
  </script>
